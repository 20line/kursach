{% macro render_item(item) %}
<div class="card" style="margin-top: 8px;">
    <div class="card-header">
        <h4 class="card-title" style="font-size: 14px;">Товар</h4>
    </div>
    <div style="padding-top: 8px;">
        {% if item %}
        <div class="card mb-3" style="position: relative;">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">{{ item.name }}</h5>
                <form action="{{ url_for('blueprint_order.remove_item') }}" method="POST" style="margin:0;">
                    <input type="hidden" name="name" value="{{ item.name }}">
                    <button type="submit" class="btn btn-sm btn-outline-danger">Удалить</button>
                </form>
            </div>
            <div class="card-body">
                <form action="{{ url_for('blueprint_order.update_item') }}" method="POST" class="row g-3">
                    <input type="hidden" name="name" value="{{ item.name }}">

                    <div class="col-md-4">
                        <label class="form-label">Вес (кг)</label>
                        <input type="number" step="0.1" name="weight" class="form-control" 
                            value="{{ item.weight }}" required>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Количество</label>
                        <input type="number" step="1" name="amount" class="form-control" 
                            value="{{ item.amount }}" required min="1">
                    </div>

                    <div class="col-md-4 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100">Обновить</button>
                    </div>
                </form>
            </div>
        </div>
        {% else %}
        <form action="" method="POST" class="form">
            <div class="form-field">
                <label class="label">Название</label>
                <input type="text" name="name" class="input" required />
            </div>
            <div class="form-field">
                <label class="label">Вес (кг)</label>
                <input
                    type="number"
                    step="0.1"
                    name="weight"
                    class="input"
                    required
                />
            </div>
            <div class="form-field">
                <label class="label">Кол-во</label>
                <input
                    type="number"
                    step="1"
                    name="amount"
                    class="input"
                    required
                />
            </div>
            <button class="btn btn-block" type="submit">Добавить</button>
        </form>
        {% endif %}
    </div>
</div>
{% endmacro %}
