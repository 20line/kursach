{% extends "base.html" %}

{% block title %}Информация по заказу{% endblock %}

{% block content %}
<div class="card" style="max-width: 480px; margin: 0 auto;">
    <div class="card-header">
        <h1 class="card-title">Получить информацию по заказу</h1>
        <p class="card-description">
            Введите ID заказа для просмотра деталей.
        </p>
    </div>

    <form
        class="form mt-4"
        method="POST"
        action="{{ url_for('blueprint_query.find_order') }}"
    >
        <div class="form-field">
            <label class="label" for="order_id">ID заказа</label>
            <input
                id="order_id"
                type="number"
                name="order_id"
                min="1"
                class="input"
                required
            />
        </div>
        <button class="btn btn-block" type="submit">Найти заказ</button>
    </form>

    <button class="btn btn-outline mt-6" onclick="window.history.back()">
        Назад
    </button>
</div>
{% endblock %}
