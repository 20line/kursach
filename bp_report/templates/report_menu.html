{% extends "base.html" %}

{% block title %}Меню отчетов{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h1 class="card-title">Отчеты</h1>
        <p class="card-description">Аналитика по заказам и клиентам.</p>
    </div>

    <div class="menu-vertical">
        {% if role == 'none' %}
        <button
            class="btn btn-block"
            onclick="window.location.href = '/report/menu/most_orders_since'"
        >
            Наибольшее количество заказов за период
        </button>

        <button
            class="btn btn-block"
            onclick="window.location.href = '/report/menu/most_orders_user'"
        >
            Клиент с наибольшим количеством заказов
        </button>
        {% endif %}

        {% if role == 'admin' %}
        <button
            class="btn btn-block"
            onclick="window.location.href = '/report/menu/monthly_summary'"
        >
            Сводка заказов за месяц
        </button>
        <button
            class="btn btn-block"
            onclick="window.location.href = '/report/menu/top_clients'"
        >
            ТОП клиентов по весу за месяц
        </button>
        <button
            class="btn btn-block"
            onclick="window.location.href = '/report/menu/largest_orders'"
        >
            Самые крупные заказы за месяц
        </button>
        {% endif %}

        <button class="btn btn-outline btn-block" onclick="window.location.href = '/'">
            Назад в главное меню
        </button>
    </div>
</div>
{% endblock %}
